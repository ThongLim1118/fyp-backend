services:
  freqtrade-bot1:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-MaCross-USDT_dry-run
    restart: unless-stopped
    volumes:
      - ./bot_configs/MaCross(USDT):/freqtrade/user_data
      - ./shared_db:/freqtrade/shared_db
    command: >
      trade --config /freqtrade/user_data/config.json

  freqtrade-bot2:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-Rsi-USDT_dry-run
    restart: unless-stopped
    volumes:
      - ./bot_configs/Rsi(USDT):/freqtrade/user_data
      - ./shared_db:/freqtrade/shared_db
    command: >
      trade --config /freqtrade/user_data/config.json

